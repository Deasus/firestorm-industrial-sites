name: update-industrial-sites

# Weekly refresh of the merged industrial_sites.geojson. EPA FRS
# refreshes ~monthly, Smithsonian GVP updates episodically, Natural
# Earth is stable — weekly is defensive and cheap.
#
# Manual re-run via workflow_dispatch when a specific source has a
# priority update (e.g. new eruption listed in GVP).

on:
  schedule:
    - cron: '0 8 * * 0'   # Sundays 08:00 UTC
  workflow_dispatch:

concurrency:
  group: update-industrial-sites
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: |
          # ogr2ogr for the fastest shapefile->GeoJSON path
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gdal-bin
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch EPA FRS thermal-emitter facilities
        run: python fetch_epa_frs.py

      - name: Fetch Smithsonian GVP Holocene volcanoes
        run: python fetch_gvp.py

      - name: Fetch NASA GIBS nuclear-plant locations (Path B)
        run: python fetch_gibs_nuclear.py
        continue-on-error: true

      - name: Self-mine persistent thermal sources from our 90-day FIRMS archive (Path A)
        # Replaces the earlier fetch_vnp14imgml.py attempt: VNP14IMGML is a
        # UMD-local product, not an actual NASA-cataloged product (verified
        # 2026-07-02 via CMR zero-results search). NASA's Type field is
        # computed by UMD via 90-day clustering — we replicate the same
        # algorithm on our own FIRMS archive to get real-time equivalent
        # classification with no auth / no license / no 1-month lag.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python self_mine_persistent.py
        continue-on-error: true
        timeout-minutes: 10

      - name: Fetch Natural Earth 10m land polygons
        run: python fetch_ne_land.py

      - name: Merge into industrial_sites.geojson
        run: python build_industrial_sites.py

      - name: Build weekly FIRMS-validation digest (operator verdicts → NASA)
        # Aggregates last 7 days of operator verdicts from the private
        # firestorm-deconflict-feedback repo into a Markdown digest emailable
        # to earthdata-support@nasa.gov + Louis Giglio (UMD) + Wilfrid
        # Schroeder (NOAA NESDIS). Emitted to data/firms_digest_YYYYWWW.md
        # + data/firms_digest_latest.md (stable path for humans to grab).
        # Requires GITHUB_TOKEN with read access to firestorm-deconflict-feedback
        # (auto-supplied on GHA, works because the workflow runs in the same
        # org). continue-on-error: never let the digest step break the
        # main sites pipeline.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python build_firms_digest.py
        continue-on-error: true
        timeout-minutes: 5

      - name: Show build result
        run: |
          ls -lh data/
          echo "--- meta ---"
          cat data/industrial_sites_meta.json

      - name: Commit if changed
        run: |
          git config user.name  "firestorm-industrial-sites-bot"
          git config user.email "firestorm-industrial-sites-bot@users.noreply.github.com"
          # Track only the versioned outputs — never the caches.
          git add data/industrial_sites.geojson \
                  data/industrial_sites.min.geojson \
                  data/industrial_sites_meta.json \
                  data/land_10m.geojson \
                  data/firms_digest_*.md 2>/dev/null || true
          git add data/firms_digest_*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "refresh industrial_sites — $(date -u +%Y-%m-%dT%H:%MZ)"
            # Race-safe push (same pattern as firestorm-firms-data):
            # concurrent workflow_dispatch invocations can land between our
            # checkout and our push. Data-file merge conflicts always resolve
            # by taking OUR (newer) regeneration.
            for attempt in 1 2 3 4; do
              if git push 2>&1; then
                echo "push succeeded on attempt $attempt"
                exit 0
              fi
              echo "push attempt $attempt rejected — fetching + rebasing (ours-preferred)"
              git fetch origin main
              git rebase -X ours origin/main || { git rebase --abort; sleep 5; }
            done
            echo "::error::push failed after 4 attempts"
            exit 1
          fi
